[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
implicit_optional = true
warn_unused_ignores = false

# Third-party libs without stubs
[[tool.mypy.overrides]]
module = [
    "esb.pipeline.antislop",  # complex list comprehension inference
    "esb.core.config",        # pydantic-settings dynamic field construction
    "dropbox_sign.*",
    "stripe.*",
    "passlib.*",
    "jose.*",
    "pyotp.*",
    "structlog.*",
    "celery.*",
    "sentry_sdk.*",
    "factory.*",
]
ignore_errors = true

# Router and IRR service: DB scalars typed T | None by design; runtime guards
# prevent None from reaching use-sites. Suppress narrowing noise here.
[[tool.mypy.overrides]]
module = ["esb.routers.billing", "esb.services.irr"]
ignore_errors = true
