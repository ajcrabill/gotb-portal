services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: esb_portal
      POSTGRES_USER: esb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"  # localhost-only; avoids 5432 (host PG) and 5433 (devon)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esb -d esb_portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile.backend
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://esb:${POSTGRES_PASSWORD}@db:5432/esb_portal
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    restart: on-failure

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: ../.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://esb:${POSTGRES_PASSWORD}@db:5432/esb_portal
      ENVIRONMENT: production
      FRONTEND_URL: https://gotb.effectiveschoolboards.com
    volumes:
      - eval_docs:/app/data/eval-docs
      - ../.ssh/whisper_remotes:/app/.ssh/whisper_remotes:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=esb-portal_default"
      - "traefik.http.routers.esb-api.rule=Host(`api.gotb.effectiveschoolboards.com`)"
      - "traefik.http.routers.esb-api.entrypoints=websecure"
      - "traefik.http.routers.esb-api.tls=true"
      - "traefik.http.routers.esb-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.esb-api.loadbalancer.server.port=8000"

networks:
  default:
    name: esb-portal_default

volumes:
  pg_data:
  eval_docs:
