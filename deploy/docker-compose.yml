services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: esb_portal
      POSTGRES_USER: esb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"  # localhost-only; avoids 5432 (host PG) and 5433 (devon)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esb -d esb_portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: ./deploy/Dockerfile.backend
    env_file: ./.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://esb:${POSTGRES_PASSWORD}@db:5432/esb_portal
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: ./deploy/Dockerfile.backend
    restart: unless-stopped
    env_file: ./.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://esb:${POSTGRES_PASSWORD}@db:5432/esb_portal
      ENVIRONMENT: production
      FRONTEND_URL: https://${DOMAIN:-gotb.effectiveschoolboards.com}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=esb-portal_default"
      - "traefik.http.routers.esb-api.rule=Host(`${DOMAIN:-gotb.effectiveschoolboards.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.esb-api.entrypoints=websecure"
      - "traefik.http.routers.esb-api.tls=true"
      - "traefik.http.routers.esb-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.esb-api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: ./deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-gotb.effectiveschoolboards.com}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=esb-portal_default"
      - "traefik.http.routers.esb-portal.rule=Host(`${DOMAIN:-gotb.effectiveschoolboards.com}`)"
      - "traefik.http.routers.esb-portal.entrypoints=websecure"
      - "traefik.http.routers.esb-portal.tls=true"
      - "traefik.http.routers.esb-portal.tls.certresolver=letsencrypt"
      - "traefik.http.services.esb-portal.loadbalancer.server.port=3000"

networks:
  default:
    name: esb-portal_default

volumes:
  pg_data:
